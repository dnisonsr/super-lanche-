<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Le Jollye - Gestão & Cardápio</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#630f24">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Impressão Térmica */
        @media print {
            body * { display: none !important; }
            #area-print, #area-print * { display: block !important; }
            #area-print { position: absolute; left:0; top:0; width:100%; font-family: monospace; font-size: 12px; }
        }

        .tab-active { border-bottom: 3px solid #d4af37; color: #d4af37; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <div id="splash" class="fixed inset-0 z-[100] flex flex-col justify-center items-center bg-[#630f24]">
        <img src="https://i.ibb.co/9ky3YJjF/logo-loja.jpg" class="w-48 h-48 rounded-full shadow-2xl mb-6 border-4 border-[#d4af37]">
        <div class="flex flex-col items-center gap-2">
            <div class="w-12 h-12 border-4 border-[#d4af37]/20 border-t-[#d4af37] rounded-full animate-spin"></div>
            <p class="text-[#d4af37] font-bold tracking-widest uppercase text-xs mt-2">Le Jollye Lanches</p>
        </div>
    </div>

    <header class="bg-[#630f24] text-white p-6 rounded-b-[40px] shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 p-4">
            <button onclick="abrirAdmin()" class="bg-black/20 p-2 rounded-full hover:bg-black/40"><i class="fas fa-user-shield"></i></button>
        </div>
        <div class="flex flex-col items-center">
            <img id="store-logo-header" src="https://i.ibb.co/9ky3YJjF/logo-loja.jpg" class="w-20 h-20 rounded-full border-2 border-[#d4af37] mb-3 shadow-lg">
            <h1 id="store-name" class="text-2xl font-bold text-[#d4af37]">Le Jollye Lanches</h1>
            <p class="text-[10px] opacity-80 uppercase tracking-tighter">Qualidade em cada mordida</p>
        </div>
        
        <div class="mt-6 w-full max-w-md mx-auto">
            <div class="relative">
                <input type="text" id="inputBusca" oninput="renderLoja()" placeholder="Buscar no cardápio..." class="w-full bg-white/10 border border-white/20 rounded-2xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:bg-white/20 transition-all">
                <i class="fas fa-search absolute left-4 top-4 opacity-50"></i>
            </div>
            <div id="lista-categorias-loja" class="flex gap-2 mt-4 overflow-x-auto hide-scroll pb-2"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="container-produtos-loja"></main>

    <div id="carrinho-fixo" class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-5px_20px_rgba(0,0,0,0.1)] p-4 z-40 rounded-t-3xl border-t border-gray-100 transition-transform duration-300 translate-y-full">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-4">
            <div class="flex-1">
                <div class="text-gray-400 text-[10px] uppercase font-bold">Total do Pedido</div>
                <div class="text-xl font-bold text-[#630f24]">R$ <span id="val-total">0,00</span></div>
                <select id="select-mesa" class="mt-1 text-xs border rounded bg-gray-50 p-1 w-full focus:ring-1 focus:ring-[#630f24] outline-none"></select>
            </div>
            <button onclick="finalizarPedido()" class="bg-[#630f24] text-[#d4af37] px-8 py-4 rounded-2xl font-bold shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-3">
                <i class="fab fa-whatsapp text-xl"></i> ENVIAR
            </button>
        </div>
    </div>

    <div id="modal-admin" class="fixed inset-0 bg-black/80 z-[60] flex justify-center items-end md:items-center p-0 md:p-4 hidden">
        <div class="bg-white w-full max-w-5xl md:rounded-3xl h-[95vh] md:h-[90vh] flex flex-col overflow-hidden">
            <div class="bg-[#630f24] p-4 flex justify-between items-center text-white">
                <h2 class="font-bold uppercase tracking-widest text-sm"><i class="fas fa-tools mr-2 text-[#d4af37]"></i> Painel Jollye Gestão</h2>
                <button onclick="fecharAdmin()" class="bg-white/10 w-8 h-8 rounded-full">✕</button>
            </div>

            <div id="admin-login" class="flex-1 flex flex-col justify-center items-center p-8">
                <i class="fas fa-lock text-4xl text-gray-200 mb-4"></i>
                <input type="password" id="senha-admin" placeholder="Senha Administrativa" class="border-2 border-gray-100 p-4 rounded-2xl w-full max-w-xs text-center focus:border-[#630f24] outline-none mb-4">
                <button onclick="validarLogin()" class="bg-[#630f24] text-white w-full max-w-xs p-4 rounded-2xl font-bold">ENTRAR NO PAINEL</button>
            </div>

            <div id="admin-dashboard" class="hidden flex flex-col h-full">
                <div class="flex overflow-x-auto bg-gray-50 border-b hide-scroll px-4">
                    <button onclick="abaAdmin('aba-prod')" id="btn-aba-prod" class="px-4 py-3 text-xs whitespace-nowrap tab-active">Produtos</button>
                    <button onclick="abaAdmin('aba-cat')" id="btn-aba-cat" class="px-4 py-3 text-xs whitespace-nowrap">Categorias</button>
                    <button onclick="abaAdmin('aba-vendas')" id="btn-aba-vendas" class="px-4 py-3 text-xs whitespace-nowrap">Vendas</button>
                    <button onclick="abaAdmin('aba-estoque')" id="btn-aba-estoque" class="px-4 py-3 text-xs whitespace-nowrap">Estoque</button>
                    <button onclick="abaAdmin('aba-mesas')" id="btn-aba-mesas" class="px-4 py-3 text-xs whitespace-nowrap">Mesas/QR</button>
                    <button onclick="abaAdmin('aba-loja')" id="btn-aba-loja" class="px-4 py-3 text-xs whitespace-nowrap">Configurações</button>
                </div>

                <div class="flex-1 overflow-y-auto p-4 space-y-6 bg-white">
                    <div id="aba-prod" class="admin-aba">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-gray-700">Meus Lanches</h3>
                            <button onclick="abrirFormProduto()" class="bg-green-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold">+ NOVO ITEM</button>
                        </div>
                        <div id="lista-prod-admin" class="space-y-2"></div>
                    </div>

                    <div id="aba-cat" class="admin-aba hidden">
                        <h3 class="font-bold text-gray-700 mb-4">Categorias do Cardápio</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="novo-nome-cat" placeholder="Ex: Bebidas" class="flex-1 border p-2 rounded-lg text-sm">
                            <button onclick="addCategoria()" class="bg-[#630f24] text-white px-4 rounded-lg text-xs font-bold">ADD</button>
                        </div>
                        <div id="lista-cat-admin" class="space-y-2"></div>
                    </div>

                    <div id="aba-vendas" class="admin-aba hidden">
                        <div class="bg-[#630f24] p-4 rounded-2xl text-[#d4af37] mb-4">
                            <p class="text-[10px] uppercase font-bold opacity-70">Faturamento Total</p>
                            <h2 class="text-2xl font-bold">R$ <span id="fat-total">0,00</span></h2>
                        </div>
                        <div id="lista-vendas-admin" class="space-y-2"></div>
                    </div>

                    <div id="aba-estoque" class="admin-aba hidden">
                        <h3 class="font-bold text-gray-700 mb-4">Controle de Estoque</h3>
                        <div id="lista-estoque-admin" class="space-y-2"></div>
                    </div>

                    <div id="aba-mesas" class="admin-aba hidden">
                        <h3 class="font-bold text-gray-700 mb-2">Gerenciar Mesas</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="novo-nome-mesa" placeholder="Ex: Mesa 10" class="flex-1 border p-2 rounded-lg text-sm">
                            <button onclick="addMesa()" class="bg-blue-600 text-white px-4 rounded-lg text-xs font-bold">CRIAR</button>
                        </div>
                        <div id="lista-mesas-admin" class="grid grid-cols-2 gap-3"></div>
                    </div>

                    <div id="aba-loja" class="admin-aba hidden">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">WhatsApp da Loja (Somente números)</label>
                                <input type="text" id="cfg-whats" class="w-full border p-3 rounded-xl text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">Nome da Lanchonete</label>
                                <input type="text" id="cfg-nome" class="w-full border p-3 rounded-xl text-sm">
                            </div>
                            <div class="border-t pt-4">
                                <h4 class="text-xs font-bold mb-2">SEGURANÇA DOS DADOS</h4>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="exportarBackup()" class="bg-gray-800 text-white p-3 rounded-xl text-[10px] font-bold">EXPORTAR BACKUP (.JSON)</button>
                                    <label class="bg-gray-200 text

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Le Jollye - Gestão & Cardápio</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#630f24">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-out { opacity: 0; pointer-events: none; transition: opacity 0.6s ease-out; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Impressão Térmica */
        @media print {
            body * { display: none !important; }
            #area-print, #area-print * { display: block !important; }
            #area-print { position: absolute; left:0; top:0; width:100%; font-family: monospace; font-size: 12px; }
        }

        .tab-active { border-bottom: 3px solid #d4af37; color: #d4af37; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <div id="splash" class="fixed inset-0 z-[100] flex flex-col justify-center items-center bg-[#630f24] transition-all duration-700">
        <img src="https://i.ibb.co/9ky3YJjF/logo-loja.jpg" class="w-48 h-48 rounded-full shadow-2xl mb-6 border-4 border-[#d4af37]">
        <div class="flex flex-col items-center gap-2">
            <div class="w-12 h-12 border-4 border-[#d4af37]/20 border-t-[#d4af37] rounded-full animate-spin"></div>
            <p class="text-[#d4af37] font-bold tracking-widest uppercase text-xs mt-2">Le Jollye Lanches</p>
        </div>
    </div>

    <header class="bg-[#630f24] text-white p-6 rounded-b-[40px] shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 p-4">
            <button onclick="abrirAdmin()" class="bg-black/20 p-2 rounded-full hover:bg-black/40"><i class="fas fa-user-shield"></i></button>
        </div>
        <div class="flex flex-col items-center">
            <img id="store-logo-header" src="https://i.ibb.co/9ky3YJjF/logo-loja.jpg" class="w-20 h-20 rounded-full border-2 border-[#d4af37] mb-3 shadow-lg">
            <h1 id="store-name" class="text-2xl font-bold text-[#d4af37]">Le Jollye Lanches</h1>
            <p class="text-[10px] opacity-80 uppercase tracking-tighter">Qualidade em cada mordida</p>
        </div>
        
        <div class="mt-6 w-full max-w-md mx-auto">
            <div class="relative">
                <input type="text" id="inputBusca" oninput="renderLoja()" placeholder="Buscar no cardápio..." class="w-full bg-white/10 border border-white/20 rounded-2xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:bg-white/20 transition-all">
                <i class="fas fa-search absolute left-4 top-4 opacity-50"></i>
            </div>
            <div id="lista-categorias-loja" class="flex gap-2 mt-4 overflow-x-auto hide-scroll pb-2">
                </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="container-produtos-loja">
        </main>

    <div id="carrinho-fixo" class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-5px_20px_rgba(0,0,0,0.1)] p-4 z-40 rounded-t-3xl border-t border-gray-100 transition-transform duration-300">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-4">
            <div class="flex-1">
                <div class="text-gray-400 text-[10px] uppercase font-bold">Total do Pedido</div>
                <div class="text-xl font-bold text-[#630f24]">R$ <span id="val-total">0,00</span></div>
                <select id="select-mesa" class="mt-1 text-xs border rounded bg-gray-50 p-1 w-full focus:ring-1 focus:ring-[#630f24] outline-none">
                    </select>
            </div>
            <button onclick="finalizarPedido()" class="bg-[#630f24] text-[#d4af37] px-8 py-4 rounded-2xl font-bold shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-3">
                <i class="fab fa-whatsapp text-xl"></i> ENVIAR
            </button>
        </div>
    </div>

    <div id="modal-admin" class="fixed inset-0 bg-black/80 z-[60] flex justify-center items-end md:items-center p-0 md:p-4 hidden">
        <div class="bg-white w-full max-w-5xl md:rounded-3xl h-[95vh] md:h-[90vh] flex flex-col overflow-hidden">
            <div class="bg-[#630f24] p-4 flex justify-between items-center text-white">
                <h2 class="font-bold uppercase tracking-widest text-sm"><i class="fas fa-tools mr-2 text-[#d4af37]"></i> Painel Jollye Gestão</h2>
                <button onclick="fecharAdmin()" class="bg-white/10 w-8 h-8 rounded-full">✕</button>
            </div>

            <div id="admin-login" class="flex-1 flex flex-col justify-center items-center p-8">
                <i class="fas fa-lock text-4xl text-gray-200 mb-4"></i>
                <input type="password" id="senha-admin" placeholder="Senha Administrativa" class="border-2 border-gray-100 p-4 rounded-2xl w-full max-w-xs text-center focus:border-[#630f24] outline-none mb-4">
                <button onclick="validarLogin()" class="bg-[#630f24] text-white w-full max-w-xs p-4 rounded-2xl font-bold">ENTRAR NO PAINEL</button>
            </div>

            <div id="admin-dashboard" class="hidden flex flex-col h-full">
                <div class="flex overflow-x-auto bg-gray-50 border-b hide-scroll px-4">
                    <button onclick="abaAdmin('aba-prod')" id="btn-aba-prod" class="px-4 py-3 text-xs whitespace-nowrap tab-active">Produtos</button>
                    <button onclick="abaAdmin('aba-cat')" id="btn-aba-cat" class="px-4 py-3 text-xs whitespace-nowrap">Categorias</button>
                    <button onclick="abaAdmin('aba-vendas')" id="btn-aba-vendas" class="px-4 py-3 text-xs whitespace-nowrap">Vendas</button>
                    <button onclick="abaAdmin('aba-estoque')" id="btn-aba-estoque" class="px-4 py-3 text-xs whitespace-nowrap">Estoque</button>
                    <button onclick="abaAdmin('aba-mesas')" id="btn-aba-mesas" class="px-4 py-3 text-xs whitespace-nowrap">Mesas/QR</button>
                    <button onclick="abaAdmin('aba-loja')" id="btn-aba-loja" class="px-4 py-3 text-xs whitespace-nowrap">Configurações</button>
                </div>

                <div class="flex-1 overflow-y-auto p-4 space-y-6 bg-white">
                    <div id="aba-prod" class="admin-aba">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-gray-700">Meus Lanches</h3>
                            <button onclick="abrirFormProduto()" class="bg-green-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold">+ NOVO ITEM</button>
                        </div>
                        <div id="lista-prod-admin" class="space-y-2"></div>
                    </div>

                    <div id="aba-cat" class="admin-aba hidden">
                        <h3 class="font-bold text-gray-700 mb-4">Categorias do Cardápio</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="novo-nome-cat" placeholder="Ex: Bebidas" class="flex-1 border p-2 rounded-lg text-sm">
                            <button onclick="addCategoria()" class="bg-[#630f24] text-white px-4 rounded-lg text-xs font-bold">ADD</button>
                        </div>
                        <div id="lista-cat-admin" class="space-y-2"></div>
                    </div>

                    <div id="aba-vendas" class="admin-aba hidden">
                        <div class="bg-[#630f24] p-4 rounded-2xl text-[#d4af37] mb-4">
                            <p class="text-[10px] uppercase font-bold opacity-70">Faturamento Total</p>
                            <h2 class="text-2xl font-bold">R$ <span id="fat-total">0,00</span></h2>
                        </div>
                        <div id="lista-vendas-admin" class="space-y-2"></div>
                    </div>

                    <div id="aba-estoque" class="admin-aba hidden">
                        <h3 class="font-bold text-gray-700 mb-4">Controle de Estoque</h3>
                        <div id="lista-estoque-admin" class="space-y-2"></div>
                    </div>

                    <div id="aba-mesas" class="admin-aba hidden">
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="novo-nome-mesa" placeholder="Ex: Mesa 10" class="flex-1 border p-2 rounded-lg text-sm">
                            <button onclick="addMesa()" class="bg-blue-600 text-white px-4 rounded-lg text-xs font-bold">CRIAR</button>
                        </div>
                        <div id="lista-mesas-admin" class="grid grid-cols-2 gap-2"></div>
                    </div>

                    <div id="aba-loja" class="admin-aba hidden">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">WhatsApp da Loja (Somente números)</label>
                                <input type="text" id="cfg-whats" class="w-full border p-3 rounded-xl text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">Nome da Lanchonete</label>
                                <input type="text" id="cfg-nome" class="w-full border p-3 rounded-xl text-sm">
                            </div>
                            <div class="border-t pt-4">
                                <h4 class="text-xs font-bold mb-2">SEGURANÇA DOS DADOS</h4>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="exportarBackup()" class="bg-gray-800 text-white p-3 rounded-xl text-[10px] font-bold">EXPORTAR BACKUP (.JSON)</button>
                                    <label class="bg-gray-200 text-gray-800 p-3 rounded-xl text-[10px] font-bold text-center cursor-pointer">
                                        RESTAURAR BACKUP
                                        <input type="file" id="file-restore" class="hidden" onchange="importarBackup(event)">
                                    </label>
                                </div>
                            </div>
                            <button onclick="salvarConfig()" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-bold">SALVAR TUDO</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-form-prod" class="fixed inset-0 bg-black/90 z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4">
            <h3 class="font-bold text-lg" id="titulo-form">Novo Produto</h3>
            <div class="space-y-3">
                <input type="hidden" id="form-id">
                <input type="text" id="form-nome" placeholder="Nome do Lanche" class="w-full border p-3 rounded-xl text-sm">
                <input type="text" id="form-desc" placeholder="Descrição (Ingredientes)" class="w-full border p-3 rounded-xl text-sm">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" step="0.01" id="form-preco" placeholder="Preço R$" class="w-full border p-3 rounded-xl text-sm">
                    <input type="number" id="form-qtd" placeholder="Qtd Estoque" class="w-full border p-3 rounded-xl text-sm">
                </div>
                <select id="form-cat" class="w-full border p-3 rounded-xl text-sm"></select>
                <input type="text" id="form-url" placeholder="URL da Imagem" class="w-full border p-3 rounded-xl text-sm">
            </div>
            <div class="flex gap-2">
                <button onclick="fecharFormProduto()" class="flex-1 bg-gray-100 p-4 rounded-2xl font-bold text-sm">CANCELAR</button>
                <button onclick="salvarProduto()" class="flex-1 bg-[#630f24] text-white p-4 rounded-2xl font-bold text-sm">SALVAR</button>
            </div>
        </div>
    </div>

    <div id="area-print" class="hidden"></div>

    <script>
        // ESTADO GLOBAL DO APP
        let db = {
            config: { nome: "Le Jollye Lanches", logo: "https://i.ibb.co/9ky3YJjF/logo-loja.jpg", whats: "5521999999999", senha: "admin" },
            categorias: ["Hambúrgueres", "Bebidas", "Porções"],
            produtos: [],
            vendas: [],
            mesas: ["Mesa 01", "Balcão"],
            catFiltro: "Todas"
        };

        let carrinho = {};

        // INICIALIZAÇÃO
        window.onload = () => {
            const saved = localStorage.getItem('db_jollye');
            if(saved) db = JSON.parse(saved);
            
            // Carregar config na UI
            document.getElementById('store-name').innerText = db.config.nome;
            document.getElementById('store-logo-header').src = db.config.logo;
            
            renderLoja();
            renderAdmin();
            
            setTimeout(() => {
                document.getElementById('splash').classList.add('fade-out');
                setTimeout(() => document.getElementById('splash').remove(), 600);
            }, 1500);
        };

        function salvarDB() {
            localStorage.setItem('db_jollye', JSON.stringify(db));
        }

        // ================= RENDERS DA LOJA =================
        function renderLoja() {
            const container = document.getElementById('container-produtos-loja');
            const catContainer = document.getElementById('lista-categorias-loja');
            const busca = document.getElementById('inputBusca').value.toLowerCase();
            
            // Render Categorias
            catContainer.innerHTML = `<button onclick="setFiltro('Todas')" class="px-4 py-2 rounded-full text-xs whitespace-nowrap ${db.catFiltro === 'Todas' ? 'bg-[#d4af37] text-[#630f24] font-bold' : 'bg-white/10 text-white'}">Todas</button>`;
            db.categorias.forEach(cat => {
                catContainer.innerHTML += `<button onclick="setFiltro('${cat}')" class="px-4 py-2 rounded-full text-xs whitespace-nowrap ${db.catFiltro === cat ? 'bg-[#d4af37] text-[#630f24] font-bold' : 'bg-white/10 text-white'}">${cat}</button>`;
            });

            // Render Produtos
            container.innerHTML = '';
            const filtrados = db.produtos.filter(p => {
                const matchBusca = p.nome.toLowerCase().includes(busca);
                const matchCat = db.catFiltro === "Todas" || p.categoria === db.catFiltro;
                return matchBusca && matchCat;
            });

            if(filtrados.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400">Nenhum item encontrado...</div>`;
            }

            filtrados.forEach(p => {
                const qtd = carrinho[p.id] || 0;
                container.innerHTML += `
                    <div class="bg-white rounded-3xl p-3 flex items-center gap-4 shadow-sm border border-gray-100">
                        <img src="${p.url}" class="w-24 h-24 object-cover rounded-2xl bg-gray-50" onerror="this.src='https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=500'">
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-800 text-sm leading-tight">${p.nome}</h3>
                            <p class="text-[10px] text-gray-400 line-clamp-2 mt-1">${p.desc}</p>
                            <div class="flex justify-between items-center mt-2">
                                <span class="font-bold text-[#630f24]">R$ ${p.preco.toFixed(2).replace('.',',')}</span>
                                <div class="flex items-center gap-3 bg-gray-50 rounded-xl p-1">
                                    <button onclick="addCart('${p.id}', -1)" class="w-8 h-8 bg-white rounded-lg shadow-sm text-gray-400">-</button>
                                    <span class="font-bold text-xs">${qtd}</span>
                                    <button onclick="addCart('${p.id}', 1)" class="w-8 h-8 bg-[#630f24] text-white rounded-lg shadow-sm">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Render Mesas no Select
            const selectMesa = document.getElementById('select-mesa');
            selectMesa.innerHTML = `<option value="">Onde você está?</option>`;
            db.mesas.forEach(m => selectMesa.innerHTML += `<option value="${m}">${m}</option>`);

            atualizarTotalUI();
        }

        function setFiltro(cat) { db.catFiltro = cat; renderLoja(); }

        function addCart(id, n) {
            const prod = db.produtos.find(p => p.id == id);
            if(n > 0 && prod.qtd <= (carrinho[id] || 0)) {
                alert("Desculpe, estoque esgotado!");
                return;
            }
            carrinho[id] = (carrinho[id] || 0) + n;
            if(carrinho[id] <= 0) delete carrinho[id];
            renderLoja();
        }

        function atualizarTotalUI() {
            let total = 0;
            for(let id in carrinho) {
                const p = db.produtos.find(x => x.id == id);
                total += p.preco * carrinho[id];
            }
            document.getElementById('val-total').innerText = total.toFixed(2).replace('.',',');
            document.getElementById('carrinho-fixo').style.transform = total > 0 ? 'translateY(0)' : 'translateY(100%)';
        }

        function finalizarPedido() {
            const mesa = document.getElementById('select-mesa').value;
            if(!mesa) { alert("Por favor, selecione sua mesa ou local!"); return; }

            let total = 0;
            let itensStr = "";
            let vendaItens = [];

            for(let id in carrinho) {
                const p = db.produtos.find(x => x.id == id);
                const sub = p.preco * carrinho[id];
                total += sub;
                itensStr += `${carrinho[id]}x ${p.nome} - R$ ${sub.toFixed(2)}\n`;
                
                // Abate estoque
                p.qtd -= carrinho[id];
                vendaItens.push({ nome: p.nome, qtd: carrinho[id] });
            }

            const data = new Date().toLocaleString();
            const cod = "JO-" + Math.floor(1000 + Math.random() * 9000);
            
            // Grava venda
            db.vendas.unshift({ cod, data, mesa, total, itens: vendaItens });
            salvarDB();

            const msg = `*🍔 PEDIDO: ${cod}*\n\n*Local:* ${mesa}\n*Data:* ${data}\n\n*Itens:*\n${itensStr}\n*Total: R$ ${total.toFixed(2)}*`;
            const link = `https://api.whatsapp.com/send?phone=${db.config.whats}&text=${encodeURIComponent(msg)}`;
            
            window.open(link, '_blank');
            carrinho = {};
            renderLoja();
            renderAdmin();
        }

        // ================= RENDERS ADMIN =================
        function abrirAdmin() { 
            document.getElementById('modal-admin').classList.remove('hidden'); 
            document.getElementById('admin-login').classList.remove('hidden');
            document.getElementById('admin-dashboard').classList.add('hidden');
        }
        function fecharAdmin() { document.getElementById('modal-admin').classList.add('hidden'); }

        function validarLogin() {
            if(document.getElementById('senha-admin').value === db.config.senha) {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                renderAdmin();
            } else { alert("Senha incorreta!"); }
        }

        function abaAdmin(id) {
            document.querySelectorAll('.admin-aba').forEach(a => a.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('#admin-dashboard button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + id).classList.add('tab-active');
        }

        function renderAdmin() {
            // Produtos
            const listP = document.getElementById('lista-prod-admin');
            listP.innerHTML = '';
            db.produtos.forEach(p => {
                listP.innerHTML += `
                    <div class="flex items-center gap-3 p-2 border rounded-xl bg-gray-50 text-[10px]">
                        <img src="${p.url}" class="w-10 h-10 rounded-lg object-cover">
                        <div class="flex-1">
                            <p class="font-bold">${p.nome}</p>
                            <p class="text-gray-400">R$ ${p.preco.toFixed(2)} | Estoque: ${p.qtd}</p>
                        </div>
                        <button onclick="editarProduto('${p.id}')" class="text-blue-500 p-2"><i class="fas fa-edit"></i></button>
                        <button onclick="delProduto('${p.id}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });

            // Estoque
            const listE = document.getElementById('lista-estoque-admin');
            listE.innerHTML = '';
            db.produtos.forEach(p => {
                const cor = p.qtd < 5 ? 'text-red-500' : 'text-green-600';
                listE.innerHTML += `
                    <div class="flex justify-between items-center p-3 border rounded-xl text-xs">
                        <span class="font-bold">${p.nome}</span>
                        <div class="flex items-center gap-2">
                            <input type="number" onchange="mudarEstoque('${p.id}', this.value)" value="${p.qtd}" class="w-16 border rounded p-1 text-center font-bold ${cor}">
                        </div>
                    </div>
                `;
            });

            // Vendas
            let faturamento = 0;
            const listV = document.getElementById('lista-vendas-admin');
            listV.innerHTML = '';
            db.vendas.forEach(v => {
                faturamento += v.total;
                listV.innerHTML += `
                    <div class="p-3 border rounded-xl text-[10px] space-y-1">
                        <div class="flex justify-between font-bold">
                            <span>${v.cod} - ${v.mesa}</span>
                            <span class="text-[#630f24]">R$ ${v.total.toFixed(2)}</span>
                        </div>
                        <p class="text-gray-400">${v.data}</p>
                        <button onclick="imprimirVenda('${v.cod}')" class="bg-gray-100 px-2 py-1 rounded">Reimprimir</button>
                    </div>
                `;
            });
            document.getElementById('fat-total').innerText = faturamento.toFixed(2);

            // Categorias
            const listC = document.getElementById('lista-cat-admin');
            listC.innerHTML = '';
            db.categorias.forEach((c, i) => {
                listC.innerHTML += `
                    <div class="flex justify-between p-2 bg-gray-50 rounded-lg text-xs">
                        <span>${c}</span>
                        <button onclick="delCat(${i})" class="text-red-500"><i class="fas fa-times"></i></button>
                    </div>
                `;
            });

            // Mesas
            const listM = document.getElementById('lista-mesas-admin');
            listM.innerHTML = '';
            db.mesas.forEach((m, i) => {
                listM.innerHTML += `
                    <div class="p-2 border rounded-xl text-center bg-gray-50">
                        <p class="font-bold text-[10px] mb-1">${m}</p>
                        <button onclick="gerarQR('${m}')" class="bg-black text-white text-[8px] p-1 rounded block w-full mb-1">QR CODE</button>
                        <button onclick="delMesa(${i})" class="text-red-500 text-[8px]">EXCLUIR</button>
                    </div>
                `;
            });

            // Config
            document.getElementById('cfg-whats').value = db.config.whats;
            document.getElementById('cfg-nome').value = db.config.nome;
        }

        // FUNÇÕES CRUD PRODUTO
        function abrirFormProduto() { 
            document.getElementById('modal-form-prod').classList.remove('hidden');
            document.getElementById('titulo-form').innerText = "Novo Lanche";
            document.getElementById('form-id').value = "";
            document.getElementById('form-nome').value = "";
            document.getElementById('form-desc').value = "";
            document.getElementById('form-preco').value = "";
            document.getElementById('form-qtd').value = "";
            document.getElementById('form-url').value = "";
            
            const sel = document.getElementById('form-cat');
            sel.innerHTML = '';
            db.categorias.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
        }
        function fecharFormProduto() { document.getElementById('modal-form-prod').classList.add('hidden'); }

        function salvarProduto() {
            const p = {
                id: document.getElementById('form-id').value || Date.now(),
                nome: document.getElementById('form-nome').value,
                desc: document.getElementById('form-desc').value,
                preco: parseFloat(document.getElementById('form-preco').value),
                qtd: parseInt(document.getElementById('form-qtd').value),
                categoria: document.getElementById('form-cat').value,
                url: document.getElementById('form-url').value
            };

            const index = db.produtos.findIndex(x => x.id == p.id);
            if(index > -1) db.produtos[index] = p;
            else db.produtos.push(p);

            salvarDB();
            fecharFormProduto();
            renderLoja();
            renderAdmin();
        }

        function editarProduto(id) {
            const p = db.produtos.find(x => x.id == id);
            abrirFormProduto();
            document.getElementById('titulo-form').innerText = "Editar Lanche";
            document.getElementById('form-id').value = p.id;
            document.getElementById('form-nome').value = p.nome;
            document.getElementById('form-desc').value = p.desc;
            document.getElementById('form-preco').value = p.preco;
            document.getElementById('form-qtd').value = p.qtd;
            document.getElementById('form-cat').value = p.categoria;
            document.getElementById('form-url').value = p.url;
        }

        function delProduto(id) { if(confirm("Apagar este lanche?")) { db.produtos = db.produtos.filter(p => p.id != id); salvarDB(); renderLoja(); renderAdmin(); } }

        function mudarEstoque(id, val) {
            const p = db.produtos.find(x => x.id == id);
            p.qtd = parseInt(val);
            salvarDB();
            renderLoja();
            renderAdmin();
        }

        // OUTRAS FUNÇÕES ADMIN
        function addCategoria() { 
            const n = document.getElementById('novo-nome-cat').value;
            if(n) { db.categorias.push(n); salvarDB(); renderLoja(); renderAdmin(); document.getElementById('novo-nome-cat').value = ""; }
        }
        function delCat(i) { db.categorias.splice(i, 1); salvarDB(); renderLoja(); renderAdmin(); }

        function addMesa() { 
            const n = document.getElementById('novo-nome-mesa').value;
            if(n) { db.mesas.push(n); salvarDB(); renderLoja(); renderAdmin(); document.getElementById('novo-nome-mesa').value = ""; }
        }
        function delMesa(i) { db.mesas.splice(i, 1); salvarDB(); renderLoja(); renderAdmin(); }

        function salvarConfig() {
            db.config.whats = document.getElementById('cfg-whats').value;
            db.config.nome = document.getElementById('cfg-nome').value;
            salvarDB();
            alert("Configurações atualizadas!");
            location.reload();
        }

        // QR CODE E IMPRESSÃO
        function gerarQR(mesa) {
            const urlCardapio = window.location.href;
            const link = `https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=${encodeURIComponent(urlCardapio)}&choe=UTF-8`;
            window.open(link, '_blank');
        }

        function imprimirVenda(cod) {
            const v = db.vendas.find(x => x.cod == cod);
            const area = document.getElementById('area-print');
            area.innerHTML = `
                <center>
                    <b>${db.config.nome}</b><br>
                    Pedido: ${v.cod}<br>
                    Local: ${v.mesa}<br>
                    Data: ${v.data}<br>
                    ---------------------------<br>
                    ${v.itens.map(i => `${i.qtd}x ${i.nome}`).join('<br>')}
                    <br>---------------------------<br>
                    <b>TOTAL: R$ ${v.total.toFixed(2)}</b><br><br>
                    Obrigado pela preferência!
                </center>
            `;
            window.print();
        }

        // BACKUP
        function exportarBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "backup_jollye_" + Date.now() + ".json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importarBackup(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                db = JSON.parse(e.target.result);
                salvarDB();
                alert("Dados restaurados com sucesso!");
                location.reload();
            };
            reader.readAsText(event.target.files[0]);
        }
    </script>
</body>
</html>

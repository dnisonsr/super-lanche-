<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Autoatendimento & Painel</title>
    <!-- Links corrigidos do Tailwind e QRCode -->
    <script src="https://tailwindcss.com"></script>
    <script src="https://cloudflare.com"></script>
</head>
<body class="bg-gray-100 font-sans pb-24">

    <!-- TELA DO CLIENTE -->
    <div id="tela-cliente">
        <header class="bg-red-600 text-white text-center py-6 shadow-md relative">
            <h1 class="text-3xl font-bold">🍔 Lanchonete Express</h1>
            <p class="text-sm mt-1 opacity-90">Faça seu pedido direto da mesa</p>
            <div class="mt-3 inline-block bg-white text-red-600 font-bold px-4 py-1 rounded-full shadow" id="display-mesa">
                Mesa: Carregando...
            </div>
            <button onclick="abrirPainel()" class="absolute top-2 right-2 text-white opacity-40 hover:opacity-100 text-xs bg-red-800 px-2 py-1 rounded">💼 Admin</button>
        </header>

        <main class="max-w-md mx-auto p-4 space-y-6" id="conteudo-cardapio"></main>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-lg flex justify-between items-center max-w-md mx-auto rounded-t-2xl z-50">
            <div>
                <p class="text-xs text-gray-500 font-medium">Itens: <span id="qtd-itens">0</span></p>
                <p class="text-lg font-bold text-gray-900">Total: R$ <span id="valor-total">0,00</span></p>
            </div>
            <button onclick="enviarPedido()" class="bg-green-600 text-white font-bold px-5 py-3 rounded-xl hover:bg-green-700 shadow-md transition-all text-sm">
                Enviar Pedido via WhatsApp 🚀
            </button>
        </div>
    </div>

    <!-- TELA DO ADMINISTRADOR -->
    <div id="tela-admin" class="hidden min-h-screen bg-gray-900 text-white p-4">
        <div class="max-w-xl mx-auto space-y-6">
            <div class="flex justify-between items-center border-b border-gray-700 pb-4">
                <h2 class="text-2xl font-bold text-red-400">💼 Painel de Edição</h2>
                <button onclick="fecharPainel()" class="bg-gray-700 px-4 py-2 rounded-lg hover:bg-gray-600 text-sm">Sair do Painel</button>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl shadow">
                <h3 class="text-lg font-bold mb-2 text-gray-300">1. Configuração de Envio</h3>
                <label class="block text-xs text-gray-400 mb-1">WhatsApp da Lanchonete (DDD + Número, sem espaços)</label>
                <input type="text" id="config-whatsapp" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white mb-2" placeholder="Ex: 5511999999999">
                <button onclick="salvarConfig()" class="w-full bg-blue-600 font-bold p-2 rounded hover:bg-blue-700 text-sm">Salvar WhatsApp</button>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl shadow">
                <h3 class="text-lg font-bold mb-3 text-gray-300" id="form-titulo">2. Adicionar Novo Item</h3>
                <form id="prod-form" onsubmit="salvarProduto(event)" class="space-y-3">
                    <input type="hidden" id="prod-id">
                    <div>
                        <label class="block text-xs text-gray-400">Nome do Produto</label>
                        <input type="text" id="prod-nome" required class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-gray-400">Preço (R$)</label>
                            <input type="number" step="0.01" id="prod-preco" required class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400">Categoria</label>
                            <select id="prod-categoria" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white">
                                <option value="Burgers">🍔 Burgers</option>
                                <option value="Acompanhamentos">🍟 Acompanhamentos</option>
                                <option value="Bebidas">🥤 Bebidas</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400">Descrição / Ingredientes</label>
                        <input type="text" id="prod-descricao" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white">
                    </div>
                    <div class="flex gap-2">
                        <button type="submit" class="flex-1 bg-green-600 font-bold p-2 rounded hover:bg-green-700 text-sm">Salvar Item</button>
                        <button type="button" onclick="limparFormulario()" class="bg-gray-600 p-2 rounded hover:bg-gray-500 text-sm">Cancelar</button>
                    </div>
                </form>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl shadow">
                <h3 class="text-lg font-bold mb-3 text-gray-300">3. Itens Cadastrados</h3>
                <div id="lista-admin-produtos" class="space-y-2 max-h-60 overflow-y-auto pr-2"></div>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl shadow text-center">
                <h3 class="text-lg font-bold mb-2 text-left text-gray-300">4. Gerador de QR Code de Mesa</h3>
                <div class="flex gap-2 mb-4">
                    <input type="number" id="numero-mesa-gerar" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white text-center font-bold" placeholder="Nº da Mesa">
                    <button type="button" onclick="gerarQRCodeMesa()" class="bg-purple-600 font-bold px-4 rounded hover:bg-purple-700 text-sm whitespace-nowrap">Gerar QR</button>
                </div>
                <div id="qrcode-container" class="bg-white p-4 inline-block rounded-lg hidden"></div>
                <p id="qrcode-legenda" class="text-xs text-gray-400 mt-2 hidden"></p>
            </div>
        </div>
    </div>

    <script>
        const produtosPadrao = [
            { id: 1, nome: "X-Burguer Clássico", preco: 22.00, categoria: "Burgers", descricao: "Pão, carne 150g, queijo e maionese." },
            { id: 2, nome: "X-Salada Especial", preco: 25.00, categoria: "Burgers", descricao: "Pão, carne, queijo, alface e tomate." },
            { id: 3, nome: "Batata Frita", preco: 14.00, categoria: "Acompanhamentos", descricao: "Porção individual crocante." },
            { id: 4, nome: "Refrigerante Lata", preco: 6.00, categoria: "Bebidas", descricao: "Lata 350ml bem gelada." }
        ];

        let produtos = JSON.parse(localStorage.getItem('produtos')) || produtosPadrao;
        let whatsappConfig = localStorage.getItem('whatsapp') || "5511999999999";
        let carrinho = [];
        let numeroMesa = "Não informada";

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('mesa')) {
                numeroMesa = urlParams.get('mesa');
                document.getElementById('display-mesa').innerText = "Mesa: " + numeroMesa;
            } else {
                document.getElementById('display-mesa').innerText = "Mesa: Balcão";
            }
            document.getElementById('config-whatsapp').value = whatsappConfig;
            renderizarCardapio();
        };

        function renderizarCardapio() {
            const container = document.getElementById('conteudo-cardapio');
            container.innerHTML = "";
            const categorias = ["Burgers", "Acompanhamentos", "Bebidas"];
            categorias.forEach(cat => {
                const itensDaCategoria = produtos.filter(p => p.categoria === cat);
                if (itensDaCategoria.length === 0) return;
                let htmlSecao = `<section><h2 class="text-xl font-bold text-gray-800 mb-3 border-b-2 border-red-500 pb-1">${cat}</h2><div class="space-y-3">`;
                itensDaCategoria.forEach(prod => {
                    htmlSecao += `<div class="bg-white p-4 rounded-xl shadow flex justify-between items-center"><div><h3 class="font-bold text-gray-900">${prod.nome}</h3><p class="text-xs text-gray-500">${prod.descricao || ''}</p><span class="text-red-600 font-bold block mt-1">R$ ${prod.preco.toFixed(2).replace('.', ',')}</span></div><button onclick="adicionarAoCarrinho('${prod.nome}', ${prod.preco})" class="bg-red-600 text-white font-bold px-3 py-1 rounded-lg hover:bg-red-700">+</button></div>`;
                });
                htmlSecao += `</div></section>`;
                container.innerHTML += htmlSecao;
            });
        }

        function adicionarAoCarrinho(nome, preco) {
            carrinho.push({ nome, preco });
            document.getElementById('qtd-itens').innerText = carrinho.length;
            const total = carrinho.reduce((sum, item) => sum + item.preco, 0);
            document.getElementById('valor-total').innerText = total.toFixed(2).replace('.', ',');
        }

        function enviarPedido() {
            if (carrinho.length === 0) { alert("Adicione itens ao carrinho primeiro!"); return; }
            let contagemItens = {};
            carrinho.forEach(item => { contagemItens[item.nome] = (contagemItens[item.nome] || 0) + 1; });
            let mensagem = `*NOVO PEDIDO - MESA ${numeroMesa}* 🍔🔥\n\n*Itens:*\n`;
            for (let produto in contagemItens) { mensagem += `• ${contagemItens[produto]}x ${produto}\n`; }
            const total = carrinho.reduce((sum, item) => sum + item.preco, 0);
            mensagem += `\n*Total:* R$ ${total.toFixed(2).replace('.', ',')}`;

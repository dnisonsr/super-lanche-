<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardápio Digital - Le Jollye</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#630f24">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        body { -webkit-tap-highlight-color: transparent; background: #f8f5f0; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .tab-active { border-bottom: 3px solid #d4af37; color: #d4af37; font-weight: bold; }
        .view { display: none; }
        .view.active { display: block; }
        .card-product img { width: 100%; height: 150px; object-fit: cover; border-radius: 12px; }
        .admin-panel .form-control { margin-bottom: 1rem; }
        .admin-panel label { font-weight: 600; color: #4a3a2e; }
        .admin-panel input, .admin-panel textarea, .admin-panel select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e0da;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: border 0.2s;
        }
        .admin-panel input:focus, .admin-panel textarea:focus, .admin-panel select:focus {
            outline: none;
            border-color: #d4af37;
        }
        .btn-gold { background: #d4af37; color: #fff; font-weight: 600; }
        .btn-gold:hover { background: #b8942e; }
        .btn-danger { background: #b91c1c; color: #fff; }
        .btn-danger:hover { background: #991b1b; }
        .btn-outline-gold { border: 2px solid #d4af37; color: #d4af37; background: transparent; }
        .btn-outline-gold:hover { background: #d4af37; color: #fff; }
        .splash-logo { width: 120px; height: 120px; }
        @media (min-width: 640px) { .splash-logo { width: 160px; height: 160px; } }
    </style>
</head>
<body>

    <!-- ==================== SPLASH ==================== -->
    <div id="splash" class="fixed inset-0 z-[100] flex flex-col justify-center items-center bg-[#630f24] transition-opacity duration-500" style="opacity: 1;">
        <img src="https://i.ibb.co/9ky3YJjF/logo-loja.jpg" class="splash-logo rounded-full shadow-2xl mb-6 border-4 border-[#d4af37]" alt="Logo">
        <div class="flex flex-col items-center gap-2">
            <div class="w-12 h-12 border-4 border-[#d4af37]/20 border-t-[#d4af37] rounded-full animate-spin"></div>
            <p id="splash-store-name" class="text-[#d4af37] font-bold tracking-widest uppercase text-xs mt-2">Le Jollye</p>
        </div>
    </div>

    <!-- ==================== VIEW PÚBLICA ==================== -->
    <section id="view-public" class="view active">
        <!-- Header -->
        <header class="bg-[#630f24] text-white p-6 rounded-b-[40px] shadow-2xl relative overflow-hidden">
            <div class="absolute top-4 right-4 z-10">
                <button onclick="abrirLogin()" class="bg-black/20 p-3 rounded-full hover:bg-black/40 transition-colors">
                    <i class="fas fa-cog text-xl"></i>
                </button>
            </div>
            <div class="flex items-center gap-4 pt-2">
                <img src="https://i.ibb.co/9ky3YJjF/logo-loja.jpg" class="w-16 h-16 rounded-full border-2 border-[#d4af37] shadow-lg" alt="Logo">
                <div>
                    <h1 id="header-store-name" class="text-2xl font-bold text-[#d4af37]">Le Jollye</h1>
                    <p class="text-sm text-white/80">Cardápio Digital</p>
                </div>
            </div>
        </header>

        <!-- Conteúdo do cardápio -->
        <div class="p-4 max-w-4xl mx-auto">
            <div id="categorias-container" class="space-y-8">
                <!-- Renderizado via JS -->
            </div>
            <div id="sem-produtos" class="text-center text-gray-500 mt-12 hidden">
                <i class="fas fa-utensils text-4xl mb-3 block"></i>
                <p>Nenhum produto cadastrado ainda.</p>
            </div>
        </div>
    </section>

    <!-- ==================== VIEW LOGIN ==================== -->
    <section id="view-login" class="view fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 relative">
            <button onclick="fecharLogin()" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            <h2 class="text-2xl font-bold text-[#630f24] mb-2">Acesso Administrativo</h2>
            <p class="text-gray-500 text-sm mb-6">Digite a senha para gerenciar o cardápio</p>
            <form id="form-login" onsubmit="fazerLogin(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-1">Senha</label>
                    <input type="password" id="senha-login" class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-[#d4af37] outline-none" placeholder="Digite a senha" required>
                </div>
                <button type="submit" class="w-full btn-gold py-3 rounded-xl text-lg transition">Entrar</button>
                <p id="erro-login" class="text-red-500 text-sm mt-2 hidden">Senha incorreta. Tente novamente.</p>
            </form>
        </div>
    </section>

    <!-- ==================== VIEW ADMIN ==================== -->
    <section id="view-admin" class="view admin-panel bg-gray-50 min-h-screen pb-20">
        <!-- Header Admin -->
        <header class="bg-[#630f24] text-white p-4 flex items-center justify-between sticky top-0 z-10 shadow-lg">
            <h1 class="text-xl font-bold"><i class="fas fa-cog mr-2"></i> Painel Admin</h1>
            <div>
                <button onclick="sairAdmin()" class="bg-white/20 px-4 py-2 rounded-full text-sm hover:bg-white/30 transition">
                    <i class="fas fa-sign-out-alt mr-1"></i> Sair
                </button>
            </div>
        </header>

        <div class="p-4 max-w-4xl mx-auto">
            <!-- Abas -->
            <div class="flex gap-2 mb-6 border-b border-gray-200">
                <button class="tab-admin px-4 py-2 font-semibold text-gray-500 border-b-2 border-transparent" data-tab="categorias" onclick="trocarTabAdmin('categorias')">
                    <i class="fas fa-tags mr-1"></i> Categorias
                </button>
                <button class="tab-admin px-4 py-2 font-semibold text-gray-500 border-b-2 border-transparent" data-tab="produtos" onclick="trocarTabAdmin('produtos')">
                    <i class="fas fa-pizza-slice mr-1"></i> Produtos
                </button>
            </div>

            <!-- Conteúdo das abas -->
            <div id="tab-categorias" class="tab-content">
                <div class="bg-white rounded-xl shadow p-4 mb-6">
                    <h3 class="font-bold text-lg mb-3">Adicionar Categoria</h3>
                    <form id="form-categoria" onsubmit="salvarCategoria(event)">
                        <div class="flex flex-col sm:flex-row gap-3">
                            <input type="text" id="nome-categoria" placeholder="Nome da categoria (ex: Entradas)" class="flex-1 p-3 border-2 border-gray-200 rounded-xl focus:border-[#d4af37] outline-none" required>
                            <button type="submit" class="btn-gold px-6 py-3 rounded-xl transition whitespace-nowrap">Adicionar</button>
                        </div>
                        <input type="hidden" id="edit-categoria-id" value="">
                    </form>
                </div>

                <div id="lista-categorias" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <!-- Renderizado via JS -->
                </div>
            </div>

            <div id="tab-produtos" class="tab-content hidden">
                <div class="bg-white rounded-xl shadow p-4 mb-6">
                    <h3 class="font-bold text-lg mb-3" id="form-produto-title">Adicionar Produto</h3>
                    <form id="form-produto" onsubmit="salvarProduto(event)">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Nome do produto *</label>
                                <input type="text" id="nome-produto" class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-[#d4af37] outline-none" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Preço (R$) *</label>
                                <input type="number" step="0.01" id="preco-produto" class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-[#d4af37] outline-none" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Categoria *</label>
                                <select id="categoria-produto" class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-[#d4af37] outline-none" required>
                                    <option value="">Selecione</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">URL da imagem</label>
                                <input type="url" id="imagem-produto" class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-[#d4af37] outline-none" placeholder="https://exemplo.com/foto.jpg">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700">Descrição</label>
                                <textarea id="descricao-produto" rows="2" class="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-[#d4af37] outline-none" placeholder="Breve descrição do produto"></textarea>
                            </div>
                        </div>
                        <input type="hidden" id="edit-produto-id" value="">
                        <button type="submit" class="mt-4 btn-gold px-6 py-3 rounded-xl transition w-full md:w-auto">Salvar Produto</button>
                        <button type="button" onclick="cancelarEdicaoProduto()" class="mt-2 ml-2 text-gray-500 underline hidden" id="btn-cancelar-produto">Cancelar edição</button>
                    </form>
                </div>

                <div id="lista-produtos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Renderizado via JS -->
                </div>
            </div>
        </div>
    </section>

    <script>
        // ============================================================
        // CONFIGURAÇÕES GERAIS
        // ============================================================
        const STORE_NAME = 'Le Jollye';
        const ADMIN_PASSWORD = 'admin123'; // Altere aqui a senha

        // ============================================================
        // DADOS (localStorage)
        // ============================================================
        function getCategorias() {
            return JSON.parse(localStorage.getItem('categorias')) || [];
        }
        function setCategorias(cats) {
            localStorage.setItem('categorias', JSON.stringify(cats));
        }
        function getProdutos() {
            return JSON.parse(localStorage.getItem('produtos')) || [];
        }
        function setProdutos(prods) {
            localStorage.setItem('produtos', JSON.stringify(prods));
        }

        // ============================================================
        // SPLASH
        // ============================================================
        function fecharSplash() {
            const splash = document.getElementById('splash');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }
        }
        window.addEventListener('load', () => {
            // Atualiza nome da loja no splash e header
            document.querySelectorAll('#splash-store-name, #header-store-name').forEach(el => el.textContent = STORE_NAME);
            document.title = `Cardápio Digital - ${STORE_NAME}`;
            // Fecha splash com pequeno delay para transição
            setTimeout(fecharSplash, 600);
        });
        // Fallback
        setTimeout(fecharSplash, 2500);

        // ============================================================
        // NAVEGAÇÃO ENTRE VIEWS
        // ============================================================
        function mostrarView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ============================================================
        // VIEW PÚBLICA - RENDERIZAR CARDÁPIO
        // ============================================================
        function renderizarCardapio() {
            const container = document.getElementById('categorias-container');
            const semMsg = document.getElementById('sem-produtos');
            const categorias = getCategorias();
            const produtos = getProdutos();

            if (categorias.length === 0 && produtos.length === 0) {
                container.innerHTML = '';
                semMsg.classList.remove('hidden');
                return;
            }
            semMsg.classList.add('hidden');

            let html = '';
            // Exibe todas as categorias que tenham pelo menos um produto
            categorias.forEach(cat => {
                const prods = produtos.filter(p => p.categoria === cat.id);
                if (prods.length === 0) return; // não mostra categoria vazia
                html += `<div class="mb-6">
                    <h2 class="text-2xl font-bold text-[#630f24] border-b-2 border-[#d4af37] pb-2 mb-4">${cat.nome}</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">`;
                prods.forEach(p => {
                    html += `
                        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition">
                            ${p.imagem ? `<img src="${p.imagem}" alt="${p.nome}" class="w-full h-40 object-cover">` : `<div class="w-full h-40 bg-gray-200 flex items-center justify-center text-gray-400"><i class="fas fa-image text-3xl"></i></div>`}
                            <div class="p-3">
                                <h3 class="font-bold text-lg">${p.nome}</h3>
                                <p class="text-sm text-gray-500">${p.descricao || ''}</p>
                                <p class="text-[#d4af37] font-bold mt-1">R$ ${parseFloat(p.preco).toFixed(2)}</p>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            });

            // Se não houver nenhuma categoria com produtos, mas existirem produtos órfãos (sem categoria), exibe todos em "Diversos"
            const produtosSemCategoria = produtos.filter(p => !categorias.some(c => c.id === p.categoria));
            if (produtosSemCategoria.length > 0) {
                html += `<div class="mb-6">
                    <h2 class="text-2xl font-bold text-[#630f24] border-b-2 border-[#d4af37] pb-2 mb-4">Diversos</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">`;
                produtosSemCategoria.forEach(p => {
                    html += `
                        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition">
                            ${p.imagem ? `<img src="${p.imagem}" alt="${p.nome}" class="w-full h-40 object-cover">` : `<div class="w-full h-40 bg-gray-200 flex items-center justify-center text-gray-400"><i class="fas fa-image text-3xl"></i></div>`}
                            <div class="p-3">
                                <h3 class="font-bold text-lg">${p.nome}</h3>
                                <p class="text-sm text-gray-500">${p.descricao || ''}</p>
                                <p class="text-[#d4af37] font-bold mt-1">R$ ${parseFloat(p.preco).toFixed(2)}</p>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }

            container.innerHTML = html;
        }

        // ============================================================
        // LOGIN
        // ============================================================
        function abrirLogin() {
            document.getElementById('view-login').classList.remove('hidden');
            document.getElementById('senha-login').value = '';
            document.getElementById('erro-login').classList.add('hidden');
        }
        function fecharLogin() {
            document.getElementById('view-login').classList.add('hidden');
        }
        function fazerLogin(e) {
            e.preventDefault();
            const senha = document.getElementById('senha-login').value;
            if (senha === ADMIN_PASSWORD) {
                fecharLogin();
                mostrarView('view-admin');
                carregarAdmin();
            } else {
                document.getElementById('erro-login').classList.remove('hidden');
            }
        }

        // ============================================================
        // ADMIN - ABAS
        // ============================================================
        let currentTab = 'categorias';

        function trocarTabAdmin(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.tab-admin').forEach(el => {
                el.classList.remove('border-[#d4af37]', 'text-[#d4af37]');
                el.classList.add('text-gray-500', 'border-transparent');
            });
            document.querySelector(`.tab-admin[data-tab="${tab}"]`).classList.add('border-[#d4af37]', 'text-[#d4af37]');
            // Recarregar dados
            if (tab === 'categorias') renderizarCategoriasAdmin();
            else renderizarProdutosAdmin();
        }

        // ============================================================
        // ADMIN - CATEGORIAS
        // ============================================================
        function renderizarCategoriasAdmin() {
            const container = document.getElementById('lista-categorias');
            const cats = getCategorias();
            if (cats.length === 0) {
                container.innerHTML = `<div class="col-span-full text-gray-400 text-center py-6">Nenhuma categoria cadastrada.</div>`;
                return;
            }
            container.innerHTML = cats.map(cat => `
                <div class="bg-white rounded-xl shadow p-3 flex justify-between items-center border border-gray-100">
                    <span class="font-medium">${cat.nome}</span>
                    <div>
                        <button onclick="editarCategoria('${cat.id}')" class="text-blue-500 hover:text-blue-700 mr-2"><i class="fas fa-edit"></i></button>
                        <button onclick="excluirCategoria('${cat.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function salvarCategoria(e) {
            e.preventDefault();
            const nome = document.getElementById('nome-categoria').value.trim();
            const editId = document.getElementById('edit-categoria-id').value;
            let cats = getCategorias();
            if (editId) {
                // Editar
                const index = cats.findIndex(c => c.id === editId);
                if (index !== -1) cats[index].nome = nome;
                document.getElementById('edit-categoria-id').value = '';
                document.querySelector('#form-categoria button[type="submit"]').textContent = 'Adicionar';
            } else {
                // Adicionar
                const newCat = { id: Date.now().toString(), nome };
                cats.push(newCat);
            }
            setCategorias(cats);
            document.getElementById('nome-categoria').value = '';
            renderizarCategoriasAdmin();
            renderizarCardapio(); // atualiza pública
            // Atualiza select de categorias no admin
            preencherSelectCategorias();
        }

        function editarCategoria(id) {
            const cats = getCategorias();
            const cat = cats.find(c => c.id === id);
            if (!cat) return;
            document.getElementById('nome-categoria').value = cat.nome;
            document.getElementById('edit-categoria-id').value = id;
            document.querySelector('#form-categoria button[type="submit"]').textContent = 'Atualizar';
        }

        function excluirCategoria(id) {
            if (!confirm('Excluir esta categoria e todos os produtos associados?')) return;
            let cats = getCategorias().filter(c => c.id !== id);
            setCategorias(cats);
            // Remover produtos que pertenciam a essa categoria
            let prods = getProdutos().filter(p => p.categoria !== id);
            setProdutos(prods);
            renderizarCategoriasAdmin();
            renderizarProdutosAdmin();
            renderizarCardapio();
            preencherSelectCategorias();
        }

        // ============================================================
        // ADMIN - PRODUTOS
        // ============================================================
        function preencherSelectCategorias() {
            const select = document.getElementById('categoria-produto');
            const cats = getCategorias();
            const currentVal = select.value;
            select.innerHTML = '<option value="">Selecione</option>' + cats.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
            // Reaplica o valor anterior se ainda existir
            if (cats.some(c => c.id === currentVal)) select.value = currentVal;
        }

        function renderizarProdutosAdmin() {
            const container = document.getElementById('lista-produtos');
            const prods = getProdutos();
            const cats = getCategorias();
            if (prods.length === 0) {
                container.innerHTML = `<div class="col-span-full text-gray-400 text-center py-6">Nenhum produto cadastrado.</div>`;
                return;
            }
            container.innerHTML = prods.map(p => {
                const catNome = cats.find(c => c.id === p.categoria)?.nome || 'Sem categoria';
                return `
                <div class="bg-white rounded-xl shadow overflow-hidden border border-gray-100 flex flex-col">
                    ${p.imagem ? `<img src="${p.imagem}" class="w-full h-32 object-cover" alt="${p.nome}">` : `<div class="w-full h-32 bg-gray-100 flex items-center justify-center text-gray-300"><i class="fas fa-image text-2xl"></i></div>`}
                    <div class="p-3 flex-1 flex flex-col">
                        <h4 class="font-bold">${p.nome}</h4>
                        <p class="text-xs text-gray-500">${catNome}</p>
                        <p class="text-sm text-gray-600">R$ ${parseFloat(p.preco).toFixed(2)}</p>
                        <p class="text-xs text-gray-400 truncate">${p.descricao || ''}</p>
                        <div class="mt-2 flex justify-end gap-2">
                            <button onclick="editarProduto('${p.id}')" class="text-blue-500 hover:text-blue-700"><i class="fas fa-edit"></i></button>
                            <button onclick="excluirProduto('${p.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function salvarProduto(e) {
            e.preventDefault();
            const nome = document.getElementById('nome-produto').value.trim();
            const preco = parseFloat(document.getElementById('preco-produto').value);
            const categoria = document.getElementById('categoria-produto').value;
            const imagem = document.getElementById('imagem-produto').value.trim();
            const descricao = document.getElementById('descricao-produto').value.trim();
            const editId = document.getElementById('edit-produto-id').value;

            if (!categoria) { alert('Selecione uma categoria.'); return; }

            let prods = getProdutos();
            if (editId) {
                const index = prods.findIndex(p => p.id === editId);
                if (index !== -1) {
                    prods[index] = { ...prods[index], nome, preco, categoria, imagem, descricao };
                }
                document.getElementById('edit-produto-id').value = '';
                document.querySelector('#form-produto button[type="submit"]').textContent = 'Salvar Produto';
                document.getElementById('btn-cancelar-produto').classList.add('hidden');
            } else {
                const newProd = {
                    id: Date.now().toString(),
                    nome,
                    preco,
                    categoria,
                    imagem: imagem || '',
                    descricao: descricao || ''
                };
                prods.push(newProd);
            }
            setProdutos(prods);
            // Limpar formulário
            document.getElementById('nome-produto').value = '';
            document.getElementById('preco-produto').value = '';
            document.getElementById('imagem-produto').value = '';
            document.getElementById('descricao-produto').value = '';
            document.getElementById('categoria-produto').value = '';
            renderizarProdutosAdmin();
            renderizarCardapio();
        }

        function editarProduto(id) {
            const prods = getProdutos();
            const p = prods.find(prod => prod.id === id);
            if (!p) return;
            document.getElementById('nome-produto').value = p.nome;
            document.getElementById('preco-produto').value = p.preco;
            document.getElementById('categoria-produto').value = p.categoria;
            document.getElementById('imagem-produto').value = p.imagem || '';
            document.getElementById('descricao-produto').value = p.descricao || '';
            document.getElementById('edit-produto-id').value = id;
            document.querySelector('#form-produto button[type="submit"]').textContent = 'Atualizar Produto';
            document.getElementById('btn-cancelar-produto').classList.remove('hidden');
        }

        function cancelarEdicaoProduto() {
            document.getElementById('edit-produto-id').value = '';
            document.querySelector('#form-produto button[type="submit"]').textContent = 'Salvar Produto';
            document.getElementById('btn-cancelar-produto').classList.add('hidden');
            document.getElementById('form-produto').reset();
        }

        function excluirProduto(id) {
            if (!confirm('Excluir este produto?')) return;
            let prods = getProdutos().filter(p => p.id !== id);
            setProdutos(prods);
            renderizarProdutosAdmin();
            renderizarCardapio();
        }

        // ============================================================
        // ADMIN - CARREGAR INICIAL
        // ============================================================
        function carregarAdmin() {
            // Se não houver categorias, adicionar algumas de exemplo
            let cats = getCategorias();
            if (cats.length === 0) {
                const exemplos = ['Entradas', 'Pratos Principais', 'Sobremesas', 'Bebidas'];
                exemplos.forEach(nome => {
                    cats.push({ id: Date.now().toString() + Math.random().toString(36).substr(2, 4), nome });
                });
                setCategorias(cats);
            }
            preencherSelectCategorias();
            renderizarCategoriasAdmin();
            renderizarProdutosAdmin();
            trocarTabAdmin('categorias');
        }

        // ============================================================
        // ADMIN - SAIR
        // ============================================================
        function sairAdmin() {
            if (confirm('Deseja sair do painel administrativo?')) {
                mostrarView('view-public');
                renderizarCardapio();
            }
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Inicia na view pública
            mostrarView('view-public');
            renderizarCardapio();
            // Login view começa oculta
            document.getElementById('view-login').classList.add('hidden');
        });

        // Atualiza cardápio sempre que a view pública for mostrada
        // (já chamamos no DOMContentLoaded)
    </script>

</body>
</html>

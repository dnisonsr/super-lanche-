<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio Digital</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">

<header class="bg-red-600 text-white p-6 text-center shadow">
    <h1 id="nomeLojaTitulo" class="text-3xl font-bold">🍔 Minha Lanchonete</h1>
    <p>Faça seu pedido online</p>
    <button onclick="abrirPainel()" class="mt-3 bg-red-800 px-3 py-1 rounded">Admin</button>
</header>

<div class="max-w-4xl mx-auto p-4">
    <div id="produtos" class="grid md:grid-cols-2 gap-4"></div>
</div>

<div class="fixed bottom-0 left-0 right-0 bg-white shadow-lg border-t p-4 flex justify-between">
    <div>
        <div>Itens: <span id="itens">0</span></div>
        <div>Total: R$ <span id="total">0,00</span></div>
    </div>
    <button onclick="enviarPedido()" class="bg-green-600 text-white px-4 py-2 rounded">WhatsApp</button>
</div>

<div id="painel" class="hidden fixed inset-0 bg-black/80 overflow-auto">
<div class="max-w-3xl mx-auto bg-white mt-6 p-6 rounded">
<h2 class="text-2xl font-bold mb-4">Painel Administrativo</h2>

<input id="nomeLoja" class="border p-2 w-full mb-2" placeholder="Nome da Lanchonete">
<input id="whatsapp" class="border p-2 w-full mb-4" placeholder="WhatsApp Ex: 5521999999999">

<h3 class="font-bold mb-2">Cadastrar Produto</h3>

<input id="nome" class="border p-2 w-full mb-2" placeholder="Nome">
<input id="preco" type="number" step="0.01" class="border p-2 w-full mb-2" placeholder="Preço">
<input id="foto" class="border p-2 w-full mb-2" placeholder="URL da Foto">
<textarea id="descricao" class="border p-2 w-full mb-2" placeholder="Descrição"></textarea>

<button onclick="salvarProduto()" class="bg-blue-600 text-white px-4 py-2 rounded">Salvar Produto</button>
<button onclick="salvarConfig()" class="bg-green-600 text-white px-4 py-2 rounded">Salvar Configurações</button>
<button onclick="fecharPainel()" class="bg-gray-600 text-white px-4 py-2 rounded">Fechar</button>

<div id="listaAdmin" class="mt-6"></div>

<hr class="my-4">

<h3 class="font-bold">QR Code Mesa</h3>
<input id="mesa" class="border p-2" placeholder="Número da mesa">
<button onclick="gerarQR()" class="bg-purple-600 text-white px-4 py-2 rounded">Gerar</button>
<div id="qrcode" class="mt-4"></div>

</div>
</div>

<script>
let produtos = JSON.parse(localStorage.getItem('produtos')) || [
{nome:'X-Burguer',preco:20,foto:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500',descricao:'Hambúrguer artesanal'},
{nome:'Batata Frita',preco:15,foto:'https://images.unsplash.com/photo-1576107232684-1279f390859f?w=500',descricao:'Porção crocante'},
{nome:'Refrigerante',preco:6,foto:'https://images.unsplash.com/photo-1624517452488-04869289c4ca?w=500',descricao:'Lata 350ml'}
];

let carrinho=[];
let whatsapp=localStorage.getItem('whatsapp')||'5521999999999';
let nomeLoja=localStorage.getItem('nomeLoja')||'Minha Lanchonete';

document.getElementById('nomeLojaTitulo').innerText='🍔 '+nomeLoja;

function renderizar(){
let html='';
produtos.forEach((p,i)=>{
html+=`
<div class="bg-white rounded shadow overflow-hidden">
<img src="${p.foto}" class="w-full h-48 object-cover">
<div class="p-3">
<h3 class="font-bold">${p.nome}</h3>
<p>${p.descricao}</p>
<div class="font-bold text-red-600">R$ ${p.preco.toFixed(2)}</div>
<button onclick="add(${i})" class="bg-red-600 text-white px-3 py-2 rounded mt-2">Adicionar</button>
<button onclick="editar(${i})" class="bg-yellow-500 text-white px-3 py-2 rounded mt-2">Editar</button>
</div>
</div>`;
});
document.getElementById('produtos').innerHTML=html;
admin();
}

function add(i){
carrinho.push(produtos[i]);
document.getElementById('itens').innerText=carrinho.length;
let t=carrinho.reduce((a,b)=>a+b.preco,0);
document.getElementById('total').innerText=t.toFixed(2).replace('.',',');
}

function enviarPedido(){
if(carrinho.length==0){alert('Carrinho vazio');return;}
let msg='Pedido:%0A';
carrinho.forEach(x=>msg+=x.nome+' - R$ '+x.preco+'%0A');
window.open('https://wa.me/'+whatsapp+'?text='+msg);
}

function abrirPainel(){
if(prompt('Senha')==='admin'){
document.getElementById('painel').classList.remove('hidden');
}
}

function fecharPainel(){
document.getElementById('painel').classList.add('hidden');
}

function salvarConfig(){
nomeLoja=document.getElementById('nomeLoja').value||nomeLoja;
whatsapp=document.getElementById('whatsapp').value||whatsapp;
localStorage.setItem('nomeLoja',nomeLoja);
localStorage.setItem('whatsapp',whatsapp);
document.getElementById('nomeLojaTitulo').innerText='🍔 '+nomeLoja;
alert('Salvo');
}

function salvarProduto(){
produtos.push({
nome:document.getElementById('nome').value,
preco:Number(document.getElementById('preco').value),
foto:document.getElementById('foto').value,
descricao:document.getElementById('descricao').value
});
localStorage.setItem('produtos',JSON.stringify(produtos));
renderizar();
}

function editar(i){
let n=prompt('Nome',produtos[i].nome);
let p=prompt('Preço',produtos[i].preco);
let f=prompt('Foto',produtos[i].foto);
produtos[i].nome=n;
produtos[i].preco=Number(p);
produtos[i].foto=f;
localStorage.setItem('produtos',JSON.stringify(produtos));
renderizar();
}

function admin(){
let h='';
produtos.forEach((p,i)=>{
h+=`<div class="border p-2 mb-2">${p.nome} - R$ ${p.preco.toFixed(2)}
<button onclick="excluir(${i})" class="bg-red-600 text-white px-2 py-1 rounded ml-2">Excluir</button></div>`;
});
document.getElementById('listaAdmin').innerHTML=h;
}

function excluir(i){
produtos.splice(i,1);
localStorage.setItem('produtos',JSON.stringify(produtos));
renderizar();
}

function gerarQR(){
let mesa=document.getElementById('mesa').value;
let div=document.getElementById('qrcode');
div.innerHTML='';
new QRCode(div, window.location.href+'?mesa='+mesa);
}

document.getElementById('nomeLoja').value=nomeLoja;
document.getElementById('whatsapp').value=whatsapp;

renderizar();
</script>
</body>
</html>

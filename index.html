<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Super Lanche - Gestão</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:#f5f5f5;
    padding:16px;
    color:#333;
}

.container{
    max-width:600px;
    margin:0 auto;
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    font-size:1.8rem;
    color:#d32f2f;
    margin-bottom:8px;
}

.logo{
    display:block;
    max-width:150px;
    margin:0 auto 16px;
    border-radius:12px;
}

.tabs{
    display:flex;
    gap:8px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.tabs button{
    flex:1;
    padding:10px 0;
    border:none;
    background:#e0e0e0;
    border-radius:30px;
    font-weight:600;
    font-size:.95rem;
    cursor:pointer;
    transition:.2s;
}

.tabs button.ativo{
    background:#d32f2f;
    color:#fff;
}

.tab-content{
    display:none;
}

.tab-content.ativo{
    display:block;
}

.form-group{
    margin-bottom:16px;
}

label{
    display:block;
    font-weight:600;
    margin-bottom:4px;
}

input,
select,
textarea{
    width:100%;
    padding:10px 14px;
    border:1px solid #ccc;
    border-radius:12px;
    background:#fafafa;
}

.btn{
    background:#d32f2f;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:30px;
    font-weight:700;
    width:100%;
    cursor:pointer;
}

.btn:hover{
    background:#b71c1c;
}

.btn-secondary{
    background:#757575;
}

.btn-danger{
    background:#e53935;
}

.btn-small{
    width:auto;
    padding:6px 14px;
}

.lista-item{
    background:#f9f9f9;
    border-radius:16px;
    padding:14px;
    margin-bottom:12px;
    display:flex;
    gap:14px;
    align-items:center;
}

.lista-item img{
    width:64px;
    height:64px;
    object-fit:cover;
    border-radius:12px;
}

.info{
    flex:1;
}

.acoes{
    display:flex;
    gap:6px;
}

.preview-container img{
    max-width:100%;
    max-height:200px;
    border-radius:12px;
}

.vazio{
    text-align:center;
    padding:30px;
    color:#888;
}
</style>
</head>
<body>

<div class="container">

<img
class="logo"
src="https://i.ibb.co/0XfK9kK/super-lanche-logo.png"
alt="Super Lanche">

<h1>🍔 Super Lanche</h1>

<div class="tabs">
<button class="ativo" data-tab="tab-produtos">
📦 Produtos
</button>

<button data-tab="tab-mesas">
🪑 Mesas
</button>

<button data-tab="tab-pedidos">
🧾 Pedidos
</button>
</div>

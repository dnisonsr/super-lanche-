<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans pb-36">

    <header class="bg-red-600 text-white p-6 text-center shadow">
        <h1 id="nomeLojaTitulo" class="text-3xl font-bold">🍔 FEIJÃO LANCHES</h1>
        <p id="subtituloLoja">Faça seu pedido online</p>
        <button onclick="abrirPainel()" class="mt-3 bg-red-800 px-4 py-1 rounded-full text-sm font-semibold shadow hover:bg-red-900 transition">Painel Admin</button>
    </header>

    <div class="max-w-4xl mx-auto p-4">
        <div id="produtos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white shadow-lg border-t p-4 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center mb-2">
            <div>
                <div class="text-sm text-gray-600">Itens: <span id="itens" class="font-bold text-gray-900">0</span></div>
                <div class="text-lg font-bold text-gray-800 mb-1">Total: R$ <span id="total">0,00</span></div>
                <button onclick="limparCarrinho()" class="text-xs text-red-500 underline hover:text-red-700 font-semibold">Refazer / Limpar Tudo</button>
            </div>
            <button onclick="enviarPedido()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold shadow transition">Enviar via WhatsApp</button>
        </div>
        <div class="text-center text-xs text-gray-400 font-semibold tracking-wider pt-2 border-t border-gray-100">
            BY DJ FEST 2026
        </div>
    </div>

    <div id="painel" class="hidden fixed inset-0 bg-black/80 overflow-auto z-50 p-4">
        <div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-2xl my-4">
            <h2 class="text-2xl font-bold mb-4 border-b pb-2 text-gray-800">Painel Administrativo</h2>

            <div class="mb-6 bg-gray-50 p-4 rounded-lg">
                <h3 class="font-bold mb-2 text-gray-700">Configurações da Loja</h3>
                <input id="nomeLoja" class="border p-2 w-full mb-2 rounded" placeholder="Nome da Lanchonete">
                <input id="whatsapp" class="border p-2 w-full mb-2 rounded" placeholder="WhatsApp Ex: 5521999999999">
                <button onclick="salvarConfig()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded font-medium w-full transition">Salvar Configurações</button>
            </div>

            <div class="mb-6 bg-gray-50 p-4 rounded-lg">
                <h3 class="font-bold mb-2 text-gray-700">Cadastrar Novo Produto</h3>
                <input id="nome" class="border p-2 w-full mb-2 rounded" placeholder="Nome do Produto">
                <input id="preco" type="number" step="0.01" class="border p-2 w-full mb-2 rounded" placeholder="Preço (Ex: 20.00)">
                
                <label class="block text-sm font-medium text-gray-600 mb-1">Foto do Produto:</label>
                <input id="foto" type="file" accept="image/*" class="border p-2 w-full mb-2 rounded bg-white cursor-pointer">
                
                <textarea id="descricao" class="border p-2 w-full mb-2 rounded" placeholder="Descrição do produto"></textarea>
                <button onclick="salvarProduto()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-medium w-full transition">Salvar Produto</button>
            </div>

            <h3 class="font-bold mb-2 text-gray-700">Produtos Cadastrados</h3>
            <div id="listaAdmin" class="mt-2 max-h-60 overflow-y-auto border rounded p-2 bg-gray-50"></div>

            <hr class="my-6">

            <div class="bg-gray-50 p-4 rounded-lg">
                <h3 class="font-bold mb-2 text-gray-700">Gerar QR Code para Mesa</h3>
                <div class="flex gap-2">
                    <input id="mesa" class="border p-2 rounded w-full" placeholder="Número da mesa">
                    <button onclick="gerarQR()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded font-medium transition">Gerar</button>
                </div>
                <div id="qrcode" class="mt-4 flex justify-center bg-white p-4 rounded border hidden"></div>
            </div>

            <div class="mt-6">
                <button onclick="fecharPainel()" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded w-full font-medium transition">Fechar Painel</button>
            </div>
        </div>
    </div>

    <script>
        const produtosPadrao = [
            {nome:'X-Burguer', preco:20.00, foto:'🍔', descricao:'Hambúrguer artesanal com queijo derretido e molho especial.'},
            {nome:'Batata Frita', preco:15.00, foto:'🍟', descricao:'Porção de batatas fritas crocantes e sequinhas.'},
            {nome:'Refrigerante', preco:6.00, foto:'🥤', descricao:'Lata 350ml trincando de gelada.'}
        ];

        let produtos = [];
        let carrinho = [];
        
        let whatsapp = localStorage.getItem('whatsapp') || '5521979883993';
        let nomeLoja = localStorage.getItem('nomeLoja') || 'FEIJÃO LANCHES';

        document.getElementById('nomeLojaTitulo').innerText = '🍔 ' + nomeLoja;

        function carregarBancoDeDados() {
            try {
                let dadosSalvos = localStorage.getItem('produtos_db_v2');
                if (dadosSalvos) {
                    produtos = JSON.parse(dadosSalvos);
                }
                
                if (!produtos || produtos.length === 0) {
                    produtos = produtosPadrao;
                    localStorage.setItem('produtos_db_v2', JSON.stringify(produtosPadrao));
                }
            } catch (e) {
                console.log("Erro ao ler localStorage, usando produtos padrão.");
                produtos = produtosPadrao;
            }
            
            renderizar();
            verificarMesa();
        }

        function verificarMesa() {
            const urlParams = new URLSearchParams(window.location.search);
            const numeroMesa = urlParams.get('mesa');
            if (numeroMesa) {
                document.getElementById('subtituloLoja').innerText = `Você está na Mesa ${numeroMesa} • Faça seu pedido online`;
            } else {
                document.getElementById('subtituloLoja').innerText = 'Faça seu pedido online';
            }
        }

        function renderizar() {
            let html = '';
            produtos.forEach((p, i) => {
                let qtdNoCarrinho = carrinho.filter(item => item.nome === p.nome).length;
                
                let exibicaoFoto = p.foto.length < 5 
                    ? `<div class="w-full h-48 bg-gray-200 flex items-center justify-center text-6xl">${p.foto}</div>`
                    : `<img src="${p.foto}" class="w-full h-48 object-cover" onerror="this.src='https://images.unsplash.com/photo-1513104890138-7c749659a591';">`;

                html += `
                <div class="bg-white rounded-lg shadow-md overflow-hidden border border-gray-200 flex flex-col justify-between">
                    ${exibicaoFoto}
                    <div class="p-4 flex-1 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold text-xl text-gray-800">${p.nome}</h3>
                                ${qtdNoCarrinho > 0 ? `<span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-1 rounded-full">Adicionado (${qtdNoCarrinho}x)</span>` : ''}
                            </div>
                            <p class="text-gray-600 text-sm mt-1 h-12 overflow-hidden">${p.descricao}</p>
                        </div>
                        <div class="mt-4">
                            <div class="font-bold text-xl text-red-600">R$ ${Number(p.preco).toFixed(2).replace('.', ',')}</div>
                            <div class="flex flex-col gap-1.5 mt-2">
                                <button onclick="add(${i})" class="w-full bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg font-semibold text-sm transition text-center shadow-sm">Adicionar ao Pedido</button>
                                ${qtdNoCarrinho > 0 ? `<button onclick="removerUm('${p.nome}')" class="w-full bg-gray-100 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded-lg font-medium text-xs transition text-center border border-gray-200">Remover 1 unidade</button>` : ''}
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('produtos').innerHTML = html;
            admin();
        }

        function add(i) {
            carrinho.push(produtos[i]);
            atualizarTotais();
        }

        function removerUm(nomeProduto) {
            let index = carrinho.findIndex(item => item.nome === nomeProduto);
            if (index !== -1) {
                carrinho.splice(index, 1);
            }
            atualizarTotais();
        }

        function limparCarrinho() {
            if (carrinho.length === 0) return;
            if (confirm('Deseja limpar o carrinho e refazer o seu pedido do zero?')) {
                carrinho = [];
                atualizarTotais();
            }
        }

        function atualizarTotais() {
            document.getElementById('itens').innerText = carrinho.length;
            let t = carrinho.reduce((a, b) => a + Number(b.preco), 0);
            document.getElementById('total').innerText = t.toFixed(2).replace('.', ',');
            renderizar();
        }

        function enviarPedido() {
            if (carrinho.length == 0) { alert('Seu carrinho está vazio!'); return; }
            
            const urlParams = new URLSearchParams(window.location.search);
            const mesaAtual = urlParams.get('mesa') ? `(Mesa ${urlParams.get('mesa')})` : '';

            let msg = `*Novo Pedido - ${nomeLoja}* ${mesaAtual}%0A%0A`;
            
            let resumo = {};
            carrinho.forEach(item => {
                resumo[item.nome] = (resumo[item.nome] || 0) + 1;
            });
            
            for (let nome in resumo) {
                let itemOriginal = carrinho.find(c => c.nome === nome);
                let precoTotalItem = Number(itemOriginal.preco) * resumo[nome];
                msg += `• ${resumo[nome]}x ${nome} - R$ ${precoTotalItem.toFixed(2).replace('.', ',')}%0A`;
            }
            
            let totalPedido = carrinho.reduce((a, b) => a + Number(b.preco), 0);
            msg += `%0A*Total Geral: R$ ${totalPedido.toFixed(2).replace('.', ',')}*`;

            let numeroLimpo = whatsapp.replace(/\D/g, ''); 
            if (numeroLimpo.length > 0 && !numeroLimpo.startsWith('55') && numeroLimpo.length <= 11) {
                numeroLimpo = '55' + numeroLimpo;
            }

            window.open('https://wa.me/' + numeroLimpo + '?text=' + msg);
        }

        function abrirPainel() {
            if (prompt('Digite a senha de administrador:') === 'admin') {
                document.getElementById('painel').classList.remove('hidden');
            } else {
                alert('Senha incorreta!');
            }
        }

        function fecharPainel() {
            document.getElementById('painel').classList.add('hidden');
        }

        function salvarConfig() {
            nomeLoja = document.getElementById('nomeLoja').value || nomeLoja;
            whatsapp = document.getElementById('whatsapp').value || whatsapp;
            localStorage.setItem('nomeLoja', nomeLoja);
            localStorage.setItem('whatsapp', whatsapp);
            document.getElementById('nomeLojaTitulo').innerText = '🍔 ' + nomeLoja;
            alert('Configurações salvas!');
            renderizar();
        }

        function converterParaBase64(arquivo) {
            return new Promise((resolve, reject) => {
                const leitor = new FileReader();
                leitor.readAsDataURL(arquivo);
                leitor.onload = () => resolve(leitor.result);
                leitor.onerror = erro => reject(erro);
            });
        }

        async function salvarProduto() {
            let nomeIn = document.getElementById('nome').value;
            let precoIn = document.getElementById('preco').value;
            let fotoInput = document.getElementById('foto');
            let descIn = document.getElementById('descricao').value;

            if(!nomeIn || !precoIn) { alert('Por favor, preencha nome e preço.'); return; }

            let urlFoto = '🍔'; 

            if (fotoInput.files && fotoInput.files[0]) {
                try {
                    urlFoto = await converterParaBase64(fotoInput.files[0]);
                } catch (erro) {
                    alert("Erro ao processar imagem. Usando ícone padrão.");
                }
            }

            produtos.push({
                nome: nomeIn,
                preco: Number(precoIn),
                foto: urlFoto,
                descricao: descIn
            });
            
            localStorage.setItem('produtos_db_v2', JSON.stringify(produtos));
            
            document.getElementById('nome').value = '';
            document.getElementById('preco').value = '';
            document.getElementById('foto').value = '';
            document.getElementById('descricao').value = '';
            
            alert('Produto adicionado com sucesso!');
            renderizar();
        }

        function edit(i) {
            let n = prompt('Nome do produto:', produtos[i].nome);
            if (n === null) return;
            let p = prompt('Preço do produto:', produtos[i].preco);
            if (p === null) return;
            let d = prompt('Descrição:', produtos[i].descricao);
            if (d === null) return;

            produtos[i].nome = n;
            produtos[i].preco = Number(p);
            produtos[i].descricao = d;
            
            localStorage.setItem('produtos_db_v2', JSON.stringify(produtos));
            renderizar();
        }

        function admin() {
            let h = '';
            produtos.forEach((p, i) => {
                let fotoPreview = p.foto.length < 5 ? p.foto : '🖼️';
                h += `
                <div class="flex justify-between items-center border-b py-2 text-sm text-gray-700">
                    <div class="flex items-center gap-2">
                        <span class="text-xl">${fotoPreview}</span>
                        <span>${p.nome} - R$ ${Number(p.preco).toFixed(2).replace('.', ',')}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="edit(${i})" class="bg-yellow-500 text-white px-2 py-1 rounded text-xs hover:bg-yellow-600 transition">Editar</button>
                        <button onclick="excluir(${i})" class="bg-red-600 text-white px-2 py-1 rounded text-xs hover:bg-red-700 transition">Excluir</button>
                    </div>
                </div>`;
            });
            document.getElementById('listaAdmin').innerHTML = h;
        }

        function excluir(i) {
            if(confirm('Tem certeza que deseja excluir este produto do sistema?')) {
                produtos.splice(i, 1);
                localStorage.setItem('produtos_db_v2', JSON.stringify(produtos));
                renderizar();
            }
        }

        function gerarQR() {
            let mesa = document.getElementById('mesa').value;
            let div = document.getElementById('qrcode');
            if(!mesa) { alert('Digite o número da mesa'); return; }
            div.innerHTML = '';
            div.classList.remove('hidden');
            
            let urlLimpa = window.location.href.split('?')[0];
            let urlMesa = urlLimpa + '?mesa=' + mesa;
            
            div.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(urlMesa)}" alt="QR Code Mesa ${mesa}" class="mx-auto my-2 border p-2 bg-white shadow-sm rounded">`;
        }

        document.getElementById('nomeLoja').value = nomeLoja;
        document.getElementById('whatsapp').value = whatsapp;

        carregarBancoDeDados();
    </script>
</body>
</html>F

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital - Le Jollye Lanches</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans pb-36">

    <header class="relative bg-cover bg-center h-64 md:h-80 shadow-inner flex flex-col justify-between items-center p-4 text-center" 
            style="background-image: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('https://lh3.googleusercontent.com/d/1X5X8v9D-pGZ46lCunXvR5_z4uA7CymD7');">
        
        <div class="w-full flex justify-end">
            <button onclick="abrirPainel()" class="bg-black/40 text-white border border-white/40 px-3 py-1 rounded-full text-xs font-semibold shadow backdrop-blur-sm hover:bg-black/60 transition">Painel Admin</button>
        </div>

        <div class="text-white drop-shadow-lg mb-2">
            <h1 id="nomeLojaTitulo" class="hidden text-3xl font-bold">🍔 Le Jollye Lanches</h1>
            <p id="subtituloLoja" class="bg-black/50 inline-block px-3 py-1 rounded-full text-sm font-medium backdrop-blur-sm">Faça seu pedido online</p>
        </div>

        <div class="w-full max-w-xl mb-4 px-2">
            <div class="relative">
                <input type="text" id="buscaInput" oninput="filtrarProdutos()" placeholder="🔍 Buscar m items..." class="w-full pl-10 pr-4 py-2.5 rounded-lg shadow-lg border border-gray-200 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500 bg-white/95">
            </div>
        </div>
    </header>

    <div class="max-w-4xl mx-auto p-4">
        <div id="produtos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white shadow-lg border-t p-4 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center mb-2">
            <div>
                <div class="text-sm text-gray-600">Itens: <span id="itens" class="font-bold text-gray-900">0</span></div>
                <div class="text-lg font-bold text-gray-800 mb-1">Total: R$ <span id="total">0,00</span></div>
                <button onclick="limparCarrinho()" class="text-xs text-red-500 underline hover:text-red-700 font-semibold">Refazer / Limpar Tudo</button>
            </div>
            <button onclick="enviarPedido()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold shadow transition">Enviar via WhatsApp</button>
        </div>
        <div class="text-center text-xs text-gray-400 font-semibold tracking-wider pt-2 border-t border-gray-100">
            BY DENIS 2026
        </div>
    </div>

    <div id="painel" class="hidden fixed inset-0 bg-black/80 overflow-auto z-50 p-4">
        <div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-2xl my-4">
            <h2 class="text-2xl font-bold mb
